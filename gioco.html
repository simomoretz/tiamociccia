<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/icon.png">
  <title>Cattura i cuori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Override body per il gioco */
    body { overflow: hidden; }

    /* ── ARENA DI GIOCO ── */
    #game-arena {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #1A0A10 0%, #2A0D18 40%, #1F0E14 100%);
      overflow: hidden;
    }

    /* Stelle di sfondo */
    #game-arena::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 90% 20%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 85%, rgba(255,255,255,0.15) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem;
      background: rgba(26,10,16,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(192,107,130,0.2);
    }
    .hud-brand {
      font-family: var(--font-display); font-style: italic;
      font-size: 1rem; color: rgba(255,255,255,0.55);
    }
    .hud-counter {
      display: flex; align-items: center; gap: 0.6rem;
    }
    .hud-counter-num {
      font-family: var(--font-display); font-size: 2rem; font-weight: 500;
      color: #fff; line-height: 1; transition: transform 0.15s ease, color 0.15s ease;
    }
    .hud-counter-num.bump { transform: scale(1.4); color: #F4A0BC; }
    .hud-counter-label {
      font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.45); line-height: 1.3;
    }
    .hud-progress {
      width: 120px; height: 4px; background: rgba(255,255,255,0.12);
      border-radius: 9999px; overflow: hidden;
    }
    .hud-progress-bar {
      height: 100%; background: linear-gradient(90deg, #C06B82, #D4956A);
      border-radius: 9999px; width: 0%; transition: width 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .hud-back {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      text-decoration: none; transition: color 0.2s;
    }
    .hud-back:hover { color: rgba(255,255,255,0.7); }

    /* ── CUORI ── */
    .heart {
      position: absolute;
      cursor: pointer;
      user-select: none;
      filter: drop-shadow(0 0 8px rgba(192,107,130,0.5));
      animation: floatUp linear forwards;
      will-change: transform;
    }
    .heart svg { display: block; }
    .heart:hover { filter: drop-shadow(0 0 16px rgba(214,142,160,0.9)) brightness(1.2); }

    @keyframes floatUp {
      0%   { transform: translateY(0)   translateX(0px)  rotate(0deg);   opacity: 0; }
      6%   { opacity: 1; }
      50%  { transform: translateY(-45vh) translateX(var(--drift)) rotate(var(--rot)); }
      92%  { opacity: 0.7; }
      100% { transform: translateY(-110vh) translateX(calc(var(--drift) * 1.4)) rotate(calc(var(--rot) * 1.2)); opacity: 0; }
    }

    /* Animazione cattura */
    @keyframes catchPop {
      0%   { transform: scale(1);   opacity: 1; }
      40%  { transform: scale(2.2); opacity: 0.9; }
      100% { transform: scale(0);   opacity: 0; }
    }
    .heart.caught {
      animation: catchPop 0.4s cubic-bezier(0.16,1,0.3,1) forwards !important;
      pointer-events: none;
      filter: drop-shadow(0 0 20px rgba(214,142,160,1));
    }

    /* ── PARTICELLE CATCH ── */
    .catch-particle {
      position: absolute; pointer-events: none;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--rose);
      animation: particleBurst 0.6s ease-out forwards;
    }
    @keyframes particleBurst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
    }

    /* ── ISTRUZIONE ── */
    #instruction {
      position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.82rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.28); pointer-events: none; z-index: 10;
      white-space: nowrap; animation: fadeInstruction 3s 1.5s forwards;
    }
    @keyframes fadeInstruction { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

    /* ── WIN SCREEN ── */
    #win-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(20,8,13,0.92);
      backdrop-filter: blur(16px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #win-screen.visible { opacity: 1; pointer-events: all; }
    .win-card {
      background: linear-gradient(145deg, #F5EDE4, #FBF6F1);
      border-radius: 24px;
      padding: clamp(2.5rem,6vw,4rem);
      max-width: 520px; width: 90%;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(192,107,130,0.2);
      transform: scale(0.85);
      transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    #win-screen.visible .win-card { transform: scale(1); }
    .win-hearts-row {
      display: flex; justify-content: center; gap: 0.4rem;
      margin-bottom: 1.6rem; flex-wrap: wrap;
    }
    .win-hearts-row svg {
      color: var(--rose);
      animation: winHeartPop 0.4s cubic-bezier(0.16,1,0.3,1) backwards;
    }
    .win-title {
      font-family: var(--font-display); font-size: clamp(1.6rem,5vw,2.4rem);
      font-weight: 400; color: #201318; line-height: 1.15; margin-bottom: 0.8rem;
    }
    .win-title em { font-style: italic; color: var(--rose); }
    .win-rule { width: 40px; height: 1.5px; background: var(--rose); margin: 1rem auto; border-radius: 2px; }
    .win-msg {
      font-family: var(--font-display); font-size: 1.05rem; font-style: italic;
      color: #6A424E; line-height: 1.9; margin-bottom: 0.8rem;
    }
    .win-sign {
      font-size: 0.88rem; color: var(--rose); letter-spacing: 0.04em; margin-top: 1rem; display: block;
    }
    .win-replay {
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-top: 1.8rem; padding: 0.75rem 1.8rem;
      background: var(--rose); color: #fff; border-radius: 9999px;
      font-size: 0.88rem; font-weight: 600; letter-spacing: 0.04em;
      cursor: pointer; border: none;
      transition: background 0.2s, transform 0.2s;
    }
    .win-replay:hover { background: var(--rose-hover); transform: translateY(-2px); }
    @keyframes winHeartPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed; top: -20px; z-index: 201;
      width: 8px; height: 8px; border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-arena"></div>

  <div id="hud">
    <span class="hud-brand">per te</span>
    <div class="hud-counter">
      <svg width="22" height="20" viewBox="0 0 20 18" fill="#C06B82"><path d="M10 17C10 17 1 11 1 5.5A4.5 4.5 0 0 1 10 2.8 4.5 4.5 0 0 1 19 5.5C19 11 10 17 10 17Z"/></svg>
      <div>
        <div class="hud-counter-num" id="caughtNum">0</div>
        <div class="hud-counter-label">/ 10 cuori</div>
      </div>
      <div style="margin-left:0.8rem;">
        <div class="hud-progress"><div class="hud-progress-bar" id="progressBar"></div></div>
      </div>
    </div>
    <a href="index.html" class="hud-back">&#8592; Home</a>
  </div>

  <p id="instruction">Clicca i cuori per catturarli</p>

  <div id="win-screen">
    <div class="win-card">
      <div class="win-hearts-row" id="winHearts"></div>
      <h2 class="win-title">Brava, <em>le hai prese tutte!</em></h2>
      <div class="win-rule"></div>
      <p class="win-msg">
        Esattamente come hai fatto con me —<br>
        ci sei riuscita senza nemmeno provarci davvero.
      </p>
      <p class="win-msg">
        Ogni cuore che hai preso è uno dei miei,<br>
        e sono tutti tuoi da quel primo giorno.
      </p>
      <span class="win-sign">— ti amo, il tuo Simo</span>
      <button class="win-replay" id="replayBtn">Gioca ancora</button>
    </div>
  </div>

  <script>
  (function() {
    const TARGET = 10;
    const arena  = document.getElementById('game-arena');
    const numEl  = document.getElementById('caughtNum');
    const barEl  = document.getElementById('progressBar');
    const winScr = document.getElementById('win-screen');

    let caught   = 0;
    let spawning = true;
    let spawnTimer = null;

    const COLORS = ['#C06B82','#D68EA0','#C9835A','#D4956A','#7A3D50','#F0B5C8'];

    function spawnHeart() {
      if (!spawning) return;
      const alive = arena.querySelectorAll('.heart:not(.caught)').length;
      if (alive >= 9) { spawnTimer = setTimeout(spawnHeart, 800); return; }

      const size    = 28 + Math.random() * 30;
      const left    = 4  + Math.random() * 88;
      const dur     = 5  + Math.random() * 5;
      const delay   = Math.random() * 0.3;
      const drift   = (Math.random() - 0.5) * 120;
      const rot     = (Math.random() - 0.5) * 30;
      const color   = COLORS[Math.floor(Math.random() * COLORS.length)];

      const h = document.createElement('div');
      h.className = 'heart';
      h.style.cssText = [
        `left:${left}%`, `bottom:-60px`,
        `width:${size}px`, `height:${size}px`,
        `animation-duration:${dur}s`,
        `animation-delay:${delay}s`,
        `--drift:${drift}px`,
        `--rot:${rot}deg`
      ].join(';');
      h.innerHTML = `<svg viewBox="0 0 20 18" width="${size}" height="${size}" fill="${color}"><path d="M10 17C10 17 1 11 1 5.5A4.5 4.5 0 0 1 10 2.8 4.5 4.5 0 0 1 19 5.5C19 11 10 17 10 17Z"/></svg>`;

      h.addEventListener('click', () => catchHeart(h));
      h.addEventListener('animationend', () => { if (!h.classList.contains('caught')) h.remove(); });
      arena.appendChild(h);

      spawnTimer = setTimeout(spawnHeart, 900 + Math.random() * 700);
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'catch-particle';
        p.style.background = color;
        p.style.left = x + 'px';
        p.style.top  = y + 'px';
        const angle = (i / 8) * Math.PI * 2;
        const dist  = 30 + Math.random() * 30;
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
        p.style.animationDuration = (0.4 + Math.random() * 0.3) + 's';
        arena.appendChild(p);
        setTimeout(() => p.remove(), 800);
      }
    }

    function catchHeart(h) {
      if (h.classList.contains('caught')) return;
      caught++;

      // Particelle
      const rect  = h.getBoundingClientRect();
      const cx    = rect.left + rect.width  / 2;
      const cy    = rect.top  + rect.height / 2;
      const color = h.querySelector('svg').getAttribute('fill');
      spawnParticles(cx, cy, color);

      h.classList.add('caught');
      setTimeout(() => h.remove(), 450);

      // Aggiorna HUD
      numEl.textContent = caught;
      numEl.classList.add('bump');
      setTimeout(() => numEl.classList.remove('bump'), 200);
      barEl.style.width = (caught / TARGET * 100) + '%';

      if (caught >= TARGET) win();
    }

    function spawnConfetti() {
      const colors = ['#C06B82','#D68EA0','#C9835A','#F0B5C8','#7A3D50','#FAF6F1'];
      for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        c.style.animationDelay    = (Math.random() * 1) + 's';
        c.style.borderRadius      = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }
    }

    function win() {
      spawning = false;
      clearTimeout(spawnTimer);
      arena.querySelectorAll('.heart').forEach(h => h.remove());

      // Cuoricini nel win card
      const wr = document.getElementById('winHearts');
      for (let i = 0; i < 10; i++) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('viewBox','0 0 20 18');
        svg.setAttribute('width','22'); svg.setAttribute('height','20');
        svg.innerHTML = '<path d="M10 17C10 17 1 11 1 5.5A4.5 4.5 0 0 1 10 2.8 4.5 4.5 0 0 1 19 5.5C19 11 10 17 10 17Z"/>';
        svg.style.animationDelay = (i * 0.07) + 's';
        wr.appendChild(svg);
      }

      winScr.classList.add('visible');
      setTimeout(spawnConfetti, 300);
    }

    document.getElementById('replayBtn').addEventListener('click', () => {
      caught = 0; spawning = true;
      numEl.textContent = '0';
      barEl.style.width = '0%';
      winScr.classList.remove('visible');
      document.getElementById('winHearts').innerHTML = '';
      arena.querySelectorAll('.heart, .catch-particle').forEach(el => el.remove());
      setTimeout(spawnHeart, 400);
    });

    // Start
    setTimeout(spawnHeart, 600);
  })();
  </script>
</body>
</html>
